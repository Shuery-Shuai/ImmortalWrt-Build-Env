name: Docker Publish

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  # schedule:
  #   - cron: "30 12 * * *"
  push:
    branches: ["main"]
    # Publish semver tags as releases.
    tags: ["v*.*.*", "*-v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建的 Git 标签（例如 bullseye-v1.0）'
        required: false
        type: string
        default: ''

env:
  # Use docker.io for Docker Hub if empty
  GHCR_REGISTRY: ghcr.io
  HUB_REGISTRY: docker.io
  # github.repository as <account>/<repo>
  GHCR_IMAGE_NAME: ${{ github.repository }}
  HUB_IMAGE_NAME: ${{ vars.DOCKERHUB_ACCOUNT }}/${{ vars.DOCKERHUB_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      # Checkout the repository at the tag if provided manually,
      # otherwise checkout the default branch.
      - name: Checkout tag if provided manually
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      # Checkout the repository at the default branch if no tag is provided manually.
      - name: Checkout repository (default)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.tag == ''
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: "v2.4.3"

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.GHCR_REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into registry ${{ env.HUB_REGISTRY }}
        if: github.event_name!= 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate extra tags from git tag for Docker metadata
      - name: Generate extra tags
        id: gen-tags
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        run: |
          TAGS=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            DISTRO="${TAG_NAME%-v*}"
            if [[ "$DISTRO" != "$TAG_NAME" ]]; then
              TAGS+=$'type=raw,value='"$DISTRO"$'\n'
            fi
            TAGS+=$'type=raw,value='"$TAG_NAME"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            DISTRO="${INPUT_TAG%-v*}"
            if [[ "$DISTRO" != "$INPUT_TAG" ]]; then
              TAGS+=$'type=raw,value='"$DISTRO"$'\n'
            fi
            TAGS+=$'type=raw,value='"$INPUT_TAG"
          fi
          echo 'extra_tags<<EOF' >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
            ${{ env.HUB_REGISTRY }}/${{ env.HUB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=enable=${{ github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '') }}
            ${{ steps.gen-tags.outputs.extra_tags }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=用于构建 ImmortalWrt 固件编译的 Docker 环境。
            org.opencontainers.image.licenses=MIT

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
